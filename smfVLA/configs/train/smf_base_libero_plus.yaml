# SMF-Base 训练配置 (LIBERO-Plus)
# SplitMeanFlow base: concat time embedding, uniform time sampling
# 数据集为 LIBERO-Plus training set (LeRobot v2.1, mp4 视频)。

# ── 方法 ─────────────────────────────────────────────────
method: smf_base
description: "SplitMeanFlow base on LIBERO-Plus: concat time embedding, uniform time sampling"

# ── 模型 ─────────────────────────────────────────────────
checkpoint: /root/autodl-tmp/checkpoints/pi05_libero
pi05: true
action_dim: 32
action_horizon: 10
action_dim_raw: 7

# ── SMF 参数 ─────────────────────────────────────────────
flow_ratio: 0.3              # p = 0.3，Bernoulli 概率设置 r = t
time_conditioning: concat    # [E(t), E(r)] + time_proj
time_sampling: uniform       # t ~ U(0,1), r ~ U(0,t)

# ── 方法开关（base 版本：全部关闭）────────────────────────
use_curriculum: false
use_anchor: false
use_bpl: false
encoder_depth: 6

# ── 训练超参 ─────────────────────────────────────────────
learning_rate: 3.0e-5
weight_decay: 0.01
warmup_ratio: 0.033          # ~1000 steps / 30000
gradient_clipping: 1.0
batch_size: 32
training_steps: 30000
precision: bf16

# ── 优化器 ───────────────────────────────────────────────
optimizer: AdamW
ema_decay: null              # SMF-Base 不使用 EMA

# ── 数据 ─────────────────────────────────────────────────
dataset: libero-plus
dataset_path: /root/autodl-tmp/datasets/libero-plus-training

# ── 保存 ─────────────────────────────────────────────────
checkpoint_dir: /root/autodl-tmp/checkpoints/smf_finetuned
log_dir: /root/autodl-tmp/smfVLA/logs/train/smf_base_libero_plus
save_every: 5000
log_every: 100

# ── WandB ────────────────────────────────────────────────
wandb:
  project: smfvla
  run_name: smf_base_libero_plus_1nfe
  tags: ["libero-plus", "1nfe", "smf_base", "jax"]

# ── 冻结策略 ─────────────────────────────────────────────
# VLM backbone (PaliGemma) 冻结；仅 action expert (_1) + 投影层 + time_proj 可训练
freeze:
  - "PaliGemma/img/**"
  - "PaliGemma/llm/embedder/**"
  - "PaliGemma/llm/final_norm/scale"
  - "PaliGemma/llm/layers/attn/q_einsum/w"
  - "PaliGemma/llm/layers/attn/kv_einsum/w"
  - "PaliGemma/llm/layers/attn/attn_vec_einsum/w"
  - "PaliGemma/llm/layers/mlp/gating_einsum"
  - "PaliGemma/llm/layers/mlp/linear"
  - "PaliGemma/llm/layers/pre_attention_norm/scale"
  - "PaliGemma/llm/layers/pre_ffw_norm/scale"

trainable:
  - "PaliGemma/llm/layers/attn/q_einsum_1/**"
  - "PaliGemma/llm/layers/attn/kv_einsum_1/**"
  - "PaliGemma/llm/layers/attn/attn_vec_einsum_1/**"
  - "PaliGemma/llm/layers/mlp_1/**"
  - "PaliGemma/llm/layers/pre_attention_norm_1/**"
  - "PaliGemma/llm/layers/pre_ffw_norm_1/**"
  - "PaliGemma/llm/final_norm_1/**"
  - "action_in_proj/**"
  - "action_out_proj/**"
  - "time_mlp_in/**"
  - "time_mlp_out/**"
  - "time_proj/**"

# ── 评测配置（可选，训练中评测）──────────────────────────
eval:
  nfe: 1
  eval_during_training: false
